<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReactCMS — Advanced example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9fafb; color: #111; }

    .hero {
      background: #1e1b4b;
      color: white;
      padding: 5rem 2rem;
      text-align: center;
    }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; }
    .hero p  { font-size: 1.125rem; opacity: 0.7; margin-top: 1rem; }
    .hero img { margin-top: 2rem; max-width: 600px; width: 100%; border-radius: 1rem; }

    .section { max-width: 800px; margin: 4rem auto; padding: 0 1.5rem; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 1rem; padding: 2rem; margin-top: 1.5rem; }

    /* Loading shimmer */
    .rcms-loading {
      position: relative;
      overflow: hidden;
      color: transparent !important;
      background: #e5e7eb;
      border-radius: 4px;
      pointer-events: none;
    }
    .rcms-loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    @media (prefers-reduced-motion: reduce) { .rcms-loading::after { animation: none; } }

    .locale-switcher { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .locale-switcher button {
      padding: 0.35rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px;
      background: white; cursor: pointer; font-size: 0.875rem;
    }
    .locale-switcher button.active { background: #4f46e5; color: white; border-color: #4f46e5; }

    #status { font-size: 0.8rem; color: #6b7280; margin-top: 1rem; font-family: monospace; }
  </style>

  <!--
    The SDK is loaded with no auto-init attributes here because we want to call
    init() programmatically after configuring locale and preview settings.
  -->
  <script src="../dist/sdk.js"></script>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <h1 data-cms="hero-title">Our platform</h1>
    <p  data-cms="hero-subtitle">Tagline goes here</p>
    <img data-cms="hero-image" data-cms-attr="src" data-cms-attr-alt="hero-image-alt"
         src="" alt="" style="display:none" id="heroImg" />
  </section>

  <!-- Feature section -->
  <section class="section">
    <div class="locale-switcher" id="localeSwitcher">
      <button class="active" data-locale="en">English</button>
      <button data-locale="fr">Français</button>
    </div>

    <!-- JSON content — read via JS, rendered manually below -->
    <div data-cms="features-json" data-cms-type="html" class="card">
      Loading features…
    </div>

    <!-- Rich text -->
    <div class="card">
      <div data-cms="about-body" data-cms-type="html">
        <p>Loading…</p>
      </div>
    </div>

    <!-- Fallback demo -->
    <p data-cms="nonexistent-key" data-cms-fallback="This key doesn't exist — showing fallback text.">
    </p>

    <p id="status"></p>
  </section>

  <script>
    // ── Programmatic init ───────────────────────────────────────────────────

    var WEBSITE_ID = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';
    var API_KEY    = 'cms_pk_your_api_key_here';
    var currentLocale = 'en';

    function init(locale) {
      return window.ReactCMS.init({
        apiKey:    API_KEY,
        websiteId: WEBSITE_ID,
        locale:    locale,
        onReady: function (result) {
          document.getElementById('status').textContent =
            'Ready in ' + result.elapsed + 'ms — ' +
            result.injected + ' injected, ' +
            result.missing.length + ' missing, ' +
            (result.fromCache ? 'from cache' : 'from API');

          // Show hero image only if it has a src
          var img = document.getElementById('heroImg');
          if (img && img.getAttribute('src')) img.style.display = '';
        },
        onError: function (err) {
          console.error('ReactCMS error:', err.code, err.message);
          document.getElementById('status').textContent = 'Error: ' + err.message;
        },
      });
    }

    // ── Locale switching ────────────────────────────────────────────────────

    document.getElementById('localeSwitcher').addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-locale]');
      if (!btn) return;

      document.querySelectorAll('#localeSwitcher button').forEach(function (b) {
        b.classList.toggle('active', b === btn);
      });

      currentLocale = btn.getAttribute('data-locale');
      init(currentLocale);
    });

    // ── Listen for SDK events ───────────────────────────────────────────────

    document.addEventListener('reactcms:ready', function (e) {
      console.log('reactcms:ready', e.detail);
    });

    document.addEventListener('reactcms:error', function (e) {
      console.error('reactcms:error', e.detail);
    });

    // ── Boot ────────────────────────────────────────────────────────────────

    init(currentLocale);
  </script>
</body>
</html>
