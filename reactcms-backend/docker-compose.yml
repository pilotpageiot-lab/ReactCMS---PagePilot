version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# ReactCMS — full stack
#
# Usage:
#   docker compose up           → start everything (infra + api)
#   docker compose up postgres redis  → start infra only (for local dev)
#   docker compose logs -f api  → tail API logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reactcms
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: reactcms_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reactcms -d reactcms_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      API_BASE_URL: http://localhost:3001
      DATABASE_URL: postgresql://reactcms:secret@postgres:5432/reactcms_dev
      REDIS_URL: redis://redis:6379
      # IMPORTANT: override these secrets in production via .env or secrets manager
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production_32c}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production_32c}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: http://localhost:5173
      RATE_LIMIT_AUTH_MAX: 5
      RATE_LIMIT_API_MAX: 120
      RATE_LIMIT_SDK_MAX: 500
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
